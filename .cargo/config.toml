[target.x86_64-apple-darwin]
linker = "clang"
rustflags = ["-D", "warnings", "-C", "link-arg=-ld_new", "-L/usr/local/opt/libpq/lib"]

[target.aarch64-apple-darwin]
rustflags = ["-D", "warnings", "-C", "link-arg=-ld_new", "-L/usr/local/opt/libpq/lib"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-D", "warnings", "-C", "link-arg=-fuse-ld=mold"]